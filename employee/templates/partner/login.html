{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Login | Africa Western Education</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen bg-slate-950 text-white">
    <div class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(59,130,246,0.22),_transparent_40%),linear-gradient(135deg,_#0f172a,_#111827,_#1e293b)] flex items-center justify-center px-4 py-10">
        <div class="w-full max-w-md rounded-3xl border border-white/10 bg-white/10 backdrop-blur-xl shadow-2xl p-8 md:p-10">
            <div class="mb-8 text-center">
                <p class="text-sky-300 uppercase tracking-[0.3em] text-xs font-semibold mb-3">Partner Portal</p>
                <h1 class="text-3xl md:text-4xl font-extrabold">Sign In</h1>
                <p class="mt-3 text-slate-300">Access the partner workspace after email verification.</p>
            </div>

            {% if messages %}
            <div class="mb-6 space-y-3">
                {% for message in messages %}
                <div class="rounded-xl border border-white/10 px-4 py-3 {% if message.tags == 'error' %}bg-rose-500/20 text-rose-100{% else %}bg-emerald-500/20 text-emerald-100{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="post" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label for="username" class="mb-2 block text-sm font-medium text-slate-200">Email or Username</label>
                    <input id="username" name="username" type="text" class="w-full rounded-xl border border-white/15 bg-slate-900/70 px-4 py-3 text-white placeholder-slate-400 focus:border-sky-400 focus:outline-none" placeholder="your.email@example.com">
                </div>
                <div>
                    <label for="password" class="mb-2 block text-sm font-medium text-slate-200">Password</label>
                    <input id="password" name="password" type="password" class="w-full rounded-xl border border-white/15 bg-slate-900/70 px-4 py-3 text-white placeholder-slate-400 focus:border-sky-400 focus:outline-none" placeholder="Your password">
                </div>
                <button type="submit" class="w-full rounded-xl bg-sky-500 px-5 py-3 font-semibold text-white transition hover:bg-sky-400">
                    Login
                </button>
            </form>

            <div class="mt-6 flex flex-col gap-3 text-center text-sm text-slate-300">
                <a href="{% url 'employee:partner_register' %}" class="font-semibold text-sky-300 hover:text-sky-200">Create a partner account</a>
                <a href="{% url 'employee:employee_login' %}" class="text-slate-400 hover:text-slate-200">Employee login</a>
            </div>
        </div>
    </div>
</body>
</html>
