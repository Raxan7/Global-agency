<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete - African Western Education</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #007bff, #0056b3);
            margin: 0;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .success-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .success-icon {
            font-size: 4rem;
            color: #28a745;
            margin-bottom: 1rem;
        }
        
        h2 {
            color: #28a745;
            margin-bottom: 1rem;
        }
        
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        
        .btn-primary {
            display: inline-block;
            padding: 0.875rem 2rem;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #0056b3, #004085);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,123,255,0.4);
        }
        
        .portal-logo {
            text-align: center;
            margin-bottom: 1rem;
        }
        
        .portal-logo i {
            font-size: 3rem;
            color: #007bff;
        }
        
        @media (max-width: 480px) {
            body {
                padding: 0.5rem;
                background: white;
            }
            
            .success-container {
                padding: 1.5rem;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="portal-logo">
            <i class="fas fa-graduation-cap"></i>
        </div>
        
        <i class="fas fa-check-circle success-icon"></i>
        
        <h2>Password Reset Complete!</h2>
        
        <p>Your password has been successfully reset. You can now log in with your new password.</p>
        
        <a href="{% url 'student_portal:login' %}" class="btn-primary">
            <i class="fas fa-sign-in-alt"></i> Login Now
        </a>
    </div>
</body>
</html>
